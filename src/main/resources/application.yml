spring:
  datasource:
    url: jdbc:mysql://localhost:33008/board?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: user
    password: 1234

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  session:
    jdbc:
      initialize-schema: always
      schema: classpath:org/springframework/session/jdbc/schema-@@platform@@.sql # Path to the SQL file to use to initialize the database schema.
      table-name: SPRING_SESSION

server:
  servlet:
    session:
      timeout: 604800s
      cookie:
        max-age: 604800s
